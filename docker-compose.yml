services:
  mariadb:
    image: mariadb:11
    env_file:
      - ./api/.env
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: auth-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: auth-platform-api
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npx prisma generate && npm run start:dev"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: auth-platform-web
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    depends_on:
      - api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
volumes:
  mariadb_data:
  redis_data: