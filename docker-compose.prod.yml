services:
  mariadb:
    image: mariadb:11
    env_file:
      - ./api/.env
    ports:
      - "${MARIADB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MARIADB_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      
  migrate:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: migrate
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: production
    depends_on:
      mariadb:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: prod
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: prod
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mariadb_data:
  redis_data:
